apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-myinfra-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-myinfra-minio
  template:
    metadata:
      labels:
        app: app-myinfra-minio
    spec:
      containers:
        - name: container-myinfra-minio
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: secret-myinfra-minio
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-myinfra-minio
                  key: MINIO_ROOT_PASSWORD
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - name: vm-myinfra-minio-data
              mountPath: /data
      volumes:
        - name: vm-myinfra-minio-data
          persistentVolumeClaim:
            claimName: pvc-myinfra-minio
