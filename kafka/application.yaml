# kafka-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mykafka
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/raviagg/mykafka.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: mykafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
