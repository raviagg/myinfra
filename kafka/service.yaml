# kafka-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: svc-myinfra-kafka
spec:
  clusterIP: None       # headless service for StatefulSet
  selector:
    app: app-myinfra-kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
